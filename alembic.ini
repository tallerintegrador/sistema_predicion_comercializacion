# Configuración de Alembic para el SPC (ADR-0026).
# La URL de la base NO se fija aquí: la resuelve `migrations/env.py` desde
# `spc.config.database_url()` (SPC_DATABASE_URL o SQLite de respaldo), para que las
# migraciones apunten a la MISMA base que la app.
[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
