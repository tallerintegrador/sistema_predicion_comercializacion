name: Deploy frontend (GitHub Pages)

# Compila el SPA (frontend/) y lo publica en GitHub Pages.
# Disparadores: push a main que toque frontend/** o este workflow, y manual.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Permisos mínimos para publicar en Pages vía OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez; no canceles un deploy en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Path raíz del project site: https://<owner>.github.io/<repo>/
      VITE_BASE: /sistema_predicion_comercializacion/
      # URL de la API de producción (Settings > Secrets > Actions).
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

      # SPA fallback: Pages devuelve 404.html en rutas profundas; servir el
      # index para que BrowserRouter resuelva el enrutado del lado cliente.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
